<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Navigator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg:      #0f1117;
    --surface: #181c27;
    --border:  #252a38;
    --muted:   #3a4155;
    --text:    #c8cdd8;
    --dim:     #606880;
    --accent:  #4f8ef7;
    --accent2: #7dd3a8;
    --accent3: #f0a050;
    --mono:    'IBM Plex Mono', monospace;
    --sans:    'IBM Plex Sans', sans-serif;
    --tile:    52px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 20px 18px;
  }

  .header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .header-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .header-sub { font-family: var(--mono); font-size: 10px; color: var(--dim); }

  .context-row { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .context-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
  label.sel-label {
    font-family: var(--mono); font-size: 9px;
    letter-spacing: .12em; text-transform: uppercase; color: var(--dim);
  }
  select {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: var(--mono); font-size: 11px;
    padding: 5px 8px; border-radius: 3px; cursor: pointer; outline: none;
  }
  select:focus { border-color: var(--accent); }

  .axis-block { margin-bottom: 14px; }
  .axis-label {
    font-family: var(--mono); font-size: 9px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--dim);
    margin-bottom: 7px; display: flex; align-items: center; gap: 8px;
  }
  .axis-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .tile-group { display: flex; flex-wrap: wrap; gap: 7px; }

  .tile {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; cursor: pointer;
  }
  .tile-img-wrap {
    width: var(--tile); height: var(--tile);
    border-radius: 8px; border: 2px solid var(--border);
    overflow: hidden; background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    transition: border-color .12s, transform .1s, box-shadow .12s;
  }
  .tile-img-wrap img {
    width: 100%; height: 100%; object-fit: cover;
    opacity: 0.5; transition: opacity .12s;
  }
  .tile-img-wrap .tile-text {
    font-family: var(--mono); font-size: 13px; font-weight: 600;
    color: var(--dim); transition: color .12s;
  }
  .tile-label {
    font-family: var(--mono); font-size: 8px; color: var(--dim);
    letter-spacing: .05em; text-align: center;
    max-width: var(--tile); transition: color .12s;
  }
  .tile:not(.disabled):hover .tile-img-wrap { border-color: var(--muted); transform: translateY(-1px); }
  .tile:not(.disabled):hover .tile-img-wrap img { opacity: 0.8; }
  .tile:not(.disabled):hover .tile-text { color: var(--text); }
  .tile:not(.disabled):hover .tile-label { color: var(--text); }

  .tile.active-blue .tile-img-wrap  { border-color: var(--accent);  box-shadow: 0 0 10px rgba(79,142,247,.3); }
  .tile.active-green .tile-img-wrap { border-color: var(--accent2); box-shadow: 0 0 10px rgba(125,211,168,.25); }
  .tile.active-amber .tile-img-wrap { border-color: var(--accent3); box-shadow: 0 0 10px rgba(240,160,80,.25); }
  .tile.active-blue .tile-img-wrap img,
  .tile.active-green .tile-img-wrap img,
  .tile.active-amber .tile-img-wrap img { opacity: 1; }
  .tile.active-blue .tile-text  { color: var(--accent); }
  .tile.active-green .tile-text { color: var(--accent2); }
  .tile.active-amber .tile-text { color: var(--accent3); }
  .tile.active-blue .tile-label  { color: var(--accent); }
  .tile.active-green .tile-label { color: var(--accent2); }
  .tile.active-amber .tile-label { color: var(--accent3); }
  .tile.disabled { opacity: 0.28; cursor: not-allowed; pointer-events: none; }

  hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  .output {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 12px 14px;
  }
  .output-label {
    font-family: var(--mono); font-size: 9px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--dim); margin-bottom: 7px;
  }
  .url-display {
    font-family: var(--mono); font-size: 9px; color: var(--accent);
    word-break: break-all; line-height: 1.6; margin-bottom: 12px;
  }

  .action-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .action-tile {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; cursor: pointer; text-decoration: none;
  }
  .action-img-wrap {
    width: 44px; height: 44px; border-radius: 8px;
    border: 2px solid var(--border); overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface);
    transition: border-color .12s, box-shadow .12s, transform .1s;
  }
  .action-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .action-img-wrap .act-text {
    font-family: var(--mono); font-size: 11px;
    font-weight: 600; color: var(--dim);
  }
  .action-label { font-family: var(--mono); font-size: 8px; color: var(--dim); }
  .action-tile.primary   .action-img-wrap { border-color: var(--accent);  box-shadow: 0 0 8px rgba(79,142,247,.2); }
  .action-tile.secondary .action-img-wrap { border-color: var(--accent2); box-shadow: 0 0 8px rgba(125,211,168,.15); }
  .action-tile.tertiary  .action-img-wrap { border-color: var(--accent3); box-shadow: 0 0 8px rgba(240,160,80,.15); }
  .action-tile.primary   .action-label { color: var(--accent); }
  .action-tile.secondary .action-label { color: var(--accent2); }
  .action-tile.tertiary  .action-label { color: var(--accent3); }
  .action-tile:not(.inactive):hover .action-img-wrap { transform: translateY(-1px); opacity: .85; }
  .action-tile.inactive { opacity: .28; pointer-events: none; }

  .state-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; align-items: center; }
  .state-pill {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: var(--mono); font-size: 9px; padding: 2px 7px;
    border-radius: 10px; background: #1a2235;
    border: 1px solid var(--border); color: var(--dim);
  }
  .state-pill .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); }
  .state-pill.on-yx .dot { background: var(--accent2); }
  .state-pill.on-tr .dot { background: var(--accent3); }
  .code-key {
    font-family: var(--mono); font-size: 10px; color: var(--text);
    background: #0a0d14; border: 1px solid var(--border);
    padding: 2px 7px; border-radius: 3px;
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">Analytics Navigator</span>
  <span class="header-sub">// payroll · prototype</span>
</div>

<div class="context-row">
  <div class="context-group">
    <label class="sel-label">Hotel</label>
    <select id="sel-hotel" onchange="onHotelChange()">
      <option value="hc">Hótel Cabin</option>
    </select>
  </div>
  <div class="context-group">
    <label class="sel-label">Department</label>
    <select id="sel-dept" onchange="render()">
      <option value="housekeeping">Housekeeping</option>
    </select>
  </div>
</div>

<hr>

<div class="axis-block">
  <div class="axis-label">Interval</div>
  <div class="tile-group" id="grp-interval"></div>
</div>
<div class="axis-block">
  <div class="axis-label">Value</div>
  <div class="tile-group" id="grp-value"></div>
</div>
<div class="axis-block">
  <div class="axis-label">Category</div>
  <div class="tile-group" id="grp-category"></div>
</div>
<div class="axis-block">
  <div class="axis-label">Rate class</div>
  <div class="tile-group" id="grp-class"></div>
</div>

<hr>

<div class="output">
  <div class="output-label">Target page</div>
  <div class="url-display" id="url-main">—</div>
  <div class="action-row" id="action-row"></div>
  <div class="state-row" id="state-row"></div>
</div>

<script>
// Single image: string. Dual split tile: [left, right] (right can be null for text fallback)
const IMG = {
  W:           'w.png',
  Q:           'Q.png',
  'T:':        'T.png',
  'kr.':       'kr.png',
  vv:          'vv.png',
  ve:          've.png',
  vb:          'vb.png',
  ve_vb:       ['ve.png', 'vb.png'],   // split tile
  '∑':         'summa.png',
  dv:          'dv.png',
  yv:          'yv.png',
  '90':        '90.png',
  '90_st':     ['90.png', null],               // 90 image + "st" text
  st:          null,
  '33_45':     null,                                  // text fallback both sides
  spreadsheet: 'spreadsheet.png',
  charts:      'charts.png',
  tr:          'tr.png',
};

const HOTELS = {
  hc: {
    name: 'Hótel Cabin',
    depts: {
      housekeeping: {
        name: 'Housekeeping',
        base: 'https://sites.google.com/view/prufa-upplysingasida-hotela/',
        section: 'payroll',
        trLinks: {
          'W_T:_vv_∑':  'payroll/tr/tr_W_T_vv',
          'W_kr._vv_∑': 'payroll/tr/tr_W_kr_vv',
        }
      }
    }
  }
};

const INTERVALS = [
  { val:'W', label:'W', hint:'weekly' },
  { val:'Q', label:'Q', hint:'quarterly' },
];
const VALUES = [
  { val:'T:',  label:'T:',  hint:'hours' },
  { val:'kr.', label:'kr.', hint:'ISK' },
];
const CATEGORIES = {
  'T:':  [
    { val:'vv',    label:'vv',    hint:'viðvera' },
    { val:'ve',    label:'ve',    hint:'veikindi' },
    { val:'vb',    label:'vb',    hint:'vb. veikindi' },
  ],
  'kr.': [
    { val:'vv',    label:'vv',    hint:'viðvera' },
    { val:'ve_vb', label:'ve_vb', hint:'veikindi' },
  ]
};
const CLASSES = {
  default: [
    { val:'∑',  label:'∑',     hint:'total' },
    { val:'dv', label:'dv',    hint:'dagvinna' },
    { val:'yv', label:'yv',    hint:'yfirvinna' },
    { val:'90', label:'90',    hint:'90%' },
    { val:'st', label:'st',    hint:'staðg.' },
    { val:'33', label:'33',    hint:'33%',    noNav:true },
    { val:'45', label:'45',    hint:'45%',    noNav:true },
  ],
  ve_vb: [
    { val:'∑',     label:'∑',      hint:'total' },
    { val:'dv',    label:'dv',     hint:'dagvinna' },
    { val:'yv',    label:'yv',     hint:'yfirvinna' },
    { val:'90_st', label:'90+st',  hint:'90%+staðg.' },
    { val:'33_45', label:'33+45',  hint:'33%+45%', noNav:true },
  ]
};

const state = { hotel:'hc', dept:'housekeeping', interval:'W', value:'T:', category:'vv', cls:'∑' };

const CAT_TO_KR     = { vv:'vv', ve:'ve_vb', vb:'ve_vb', ve_vb:'ve_vb' };
const CAT_TO_T      = { vv:'vv', ve_vb:'ve', ve:'ve', vb:'vb' };
const CLS_TO_VEVB   = { '33':'33_45', '45':'33_45', '90':'90_st', 'st':'90_st' };
const CLS_FROM_VEVB = { '33_45':'33', '90_st':'90' };

function mapCat(newVal) {
  if (newVal === 'kr.') return CAT_TO_KR[state.category] || 'vv';
  if (newVal === 'T:')  return CAT_TO_T[state.category]  || 'vv';
  return state.category;
}
function mapCls(curCat, newCat) {
  if (newCat === 've_vb' && curCat !== 've_vb') return CLS_TO_VEVB[state.cls]   || state.cls;
  if (curCat === 've_vb' && newCat !== 've_vb') return CLS_FROM_VEVB[state.cls] || state.cls;
  return state.cls;
}

const iF  = () => state.interval === 'W' ? 'w' : 'q';
const vL  = () => state.value === 'T:' ? 'T' : 'kr';
const clF = () => state.cls === '∑' ? 'sum' : state.cls === '33_45' ? '33' : state.cls === '90_st' ? '90' : state.cls;
const caF = () => iF() + '-' + (state.category === 've_vb' ? 've' : state.category);
const dept = () => HOTELS[state.hotel].depts[state.dept];

function mainURL() {
  const d = dept();
  return `${d.base}${d.section}/${iF()}/${caF()}/${clF()}/${state.interval}_${vL()}_${state.category}_${state.cls}`;
}
function yxURL() {
  const d = dept();
  const page = state.interval === 'Q'
    ? `yx_Q_${vL()}_${state.category}_${state.cls}`
    : `yx_${vL()}_${state.category}_${state.cls}`;
  return `${d.base}${d.section}/${iF()}/${caF()}/${clF()}/${page}`;
}
function trURL() {
  const key  = `${state.interval}_${state.value}_${state.category}_${state.cls}`;
  const path = dept().trLinks[key];
  return path ? dept().base + path : null;
}
function hasYx() {
  if (state.cls === 'st') return false;
  if (state.interval === 'W' && state.value === 'T:' && state.category === 'vb') return false;
  return true;
}
function hasTr() {
  return state.interval === 'W' && state.category === 'vv' && state.cls === '∑';
}

function imgHalf(src, fallbackText) {
  // Returns a half-tile element: image or text fallback
  const half = document.createElement('div');
  half.style.cssText = 'flex:1;height:100%;overflow:hidden;display:flex;align-items:center;justify-content:center;';
  if (src) {
    const img = document.createElement('img');
    img.src = src; img.alt = fallbackText;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
    img.onerror = function() {
      this.style.display='none';
      const t=document.createElement('span');
      t.className='tile-text';t.style.fontSize='10px';t.textContent=fallbackText;
      half.appendChild(t);
    };
    half.appendChild(img);
  } else {
    const t = document.createElement('span');
    t.className='tile-text';t.style.fontSize='10px';t.textContent=fallbackText;
    half.appendChild(t);
  }
  return half;
}

function makeTile(item, activeClass, onClick) {
  const { val, label, hint, noNav } = item;
  const wrap = document.createElement('div');
  wrap.className = 'tile' + (noNav ? ' disabled' : '');
  if (noNav) wrap.title = 'Sheet exists — no navigation page';

  const imgWrap = document.createElement('div');
  imgWrap.className = 'tile-img-wrap';

  const src = IMG[val];

  if (Array.isArray(src)) {
    // Split tile: two halves side by side
    imgWrap.style.cssText += ';display:flex;flex-direction:row;padding:0;gap:1px;';
    const [left, right] = src;
    const leftLabel  = val === 've_vb' ? 've' : val === '90_st' ? '90' : label.split('+')[0] || label;
    const rightLabel = val === 've_vb' ? 'vb' : val === '90_st' ? 'st' : label.split('+')[1] || '';
    imgWrap.appendChild(imgHalf(left,  leftLabel));
    imgWrap.appendChild(imgHalf(right, rightLabel));
  } else if (src) {
    const img = document.createElement('img');
    img.src = src; img.alt = label;
    img.onerror = function() {
      this.style.display='none';
      const t=document.createElement('span');t.className='tile-text';t.textContent=label;
      imgWrap.appendChild(t);
    };
    imgWrap.appendChild(img);
  } else {
    const t = document.createElement('span');
    t.className = 'tile-text'; t.textContent = label;
    imgWrap.appendChild(t);
  }

  const lbl = document.createElement('div');
  lbl.className = 'tile-label';
  lbl.textContent = hint || label;

  wrap.appendChild(imgWrap);
  wrap.appendChild(lbl);
  if (!noNav) wrap.onclick = onClick;

  return {
    el: wrap,
    setActive(on) {
      wrap.className = 'tile' + (noNav ? ' disabled' : '') + (on ? ' ' + activeClass : '');
    }
  };
}

function buildGroup(id, items, getActive, activeClass, onPick) {
  const grp = document.getElementById(id);
  grp.innerHTML = '';
  const tiles = items.map(item => {
    const t = makeTile(item, activeClass, () => onPick(item.val));
    grp.appendChild(t.el);
    return { val: item.val, tile: t };
  });
  tiles.forEach(({ val, tile }) => tile.setActive(val === getActive()));
}

function makeActionTile(imgKey, label, tileClass, href, active) {
  const a = document.createElement('a');
  a.className = 'action-tile ' + tileClass + (active ? '' : ' inactive');
  a.href = href; a.target = '_self';

  const wrap = document.createElement('div');
  wrap.className = 'action-img-wrap';
  const src = IMG[imgKey];
  if (src) {
    const img = document.createElement('img');
    img.src = src; img.alt = label;
    img.onerror = function() {
      this.style.display='none';
      const t=document.createElement('span');
      t.className='act-text'; t.textContent=label.slice(0,2);
      wrap.appendChild(t);
    };
    wrap.appendChild(img);
  } else {
    const t = document.createElement('span');
    t.className = 'act-text'; t.textContent = label.slice(0,2);
    wrap.appendChild(t);
  }

  const lbl = document.createElement('div');
  lbl.className = 'action-label'; lbl.textContent = label;
  a.appendChild(wrap); a.appendChild(lbl);
  return a;
}

function render() {
  state.hotel = document.getElementById('sel-hotel').value;
  state.dept  = document.getElementById('sel-dept').value;

  buildGroup('grp-interval', INTERVALS, () => state.interval, 'active-blue', val => {
    state.interval = val; render();
  });

  buildGroup('grp-value', VALUES, () => state.value, 'active-amber', val => {
    const newCat = mapCat(val);
    state.cls = mapCls(state.category, newCat);
    state.category = newCat;
    state.value = val;
    render();
  });

  const cats = CATEGORIES[state.value];
  if (!cats.map(c=>c.val).includes(state.category)) state.category = cats[0].val;
  buildGroup('grp-category', cats, () => state.category, 'active-green', val => {
    state.cls = mapCls(state.category, val);
    state.category = val;
    render();
  });

  const classes = state.category === 've_vb' ? CLASSES.ve_vb : CLASSES.default;
  if (!classes.map(c=>c.val).includes(state.cls)) state.cls = '∑';
  buildGroup('grp-class', classes, () => state.cls, 'active-amber', val => {
    state.cls = val; render();
  });

  document.getElementById('url-main').textContent = mainURL();

  const ar = document.getElementById('action-row');
  ar.innerHTML = '';
  ar.appendChild(makeActionTile('spreadsheet', '→ page',   'primary',   mainURL(),       true));
  ar.appendChild(makeActionTile('charts',      '⬦ charts',  'secondary',  yxURL(),         hasYx()));
  ar.appendChild(makeActionTile('tr',          '⟳ trend',   'tertiary',   trURL() || '#',  hasTr()));

  document.getElementById('state-row').innerHTML = `
    <span class="state-pill ${hasYx()?'on-yx':''}"><span class="dot"></span>yx ${hasYx()?'on':'n/a'}</span>
    <span class="state-pill ${hasTr()?'on-tr':''}"><span class="dot"></span>tr ${hasTr()?'on':'n/a'}</span>
    <span class="code-key">${state.interval}_${vL()}_${state.category}_${state.cls}</span>
  `;
}

function onHotelChange() { render(); }
render();
</script>
</body>
</html>
